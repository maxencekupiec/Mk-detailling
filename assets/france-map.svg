    <defs>
        <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff6600" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#00c8ff" stop-opacity="0.8"/>
        </linearGradient>
        <linearGradient id="borderDim" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff6600" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#00c8ff" stop-opacity="0.2"/>
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="b"/>
            <feComposite in="SourceGraphic" in2="b" operator="over"/>
        </filter>
        <filter id="glowLine">
            <feGaussianBlur stdDeviation="1.5" result="b"/>
            <feComposite in="SourceGraphic" in2="b" operator="over"/>
        </filter>
        <style>
            .pin-ring, .pin-ring-2 { animation: ringPulse 3s ease-out infinite; }
            .pin-ring-2 { animation-delay: 0.6s; }
            .pin-metz .pin-ring { animation-delay: 1s; }
            .pin-metz .pin-ring-2 { animation-delay: 1.6s; }
            .pin-lux .pin-ring { animation-delay: 2s; }
            .pin-lux .pin-ring-2 { animation-delay: 2.6s; }
            @keyframes ringPulse {
                0% { r: 5; opacity: 0.9; }
                100% { r: 20; opacity: 0; }
            }
        </style>
    </defs>
